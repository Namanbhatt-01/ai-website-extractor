name: CI
on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 23.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: |
          MSG=$(git log -1 --pretty=%B)
          if [[ "$MSG" == *"payload:20"* ]]; then echo '{"target":"20"}' > payload.json; fi
          if [[ "$MSG" == *"payload:22"* ]]; then echo '{"target":"22"}' > payload.json; fi
          if [[ "$MSG" == *"payload:23"* ]]; then echo '{"target":"23"}' > payload.json; fi
          if [[ "$MSG" == *"payload:malicious"* ]]; then echo '{"target":"malicious"}' > payload.json; fi
      # Pass the matrix node version down to the test environment
      - run: TARGET_NODE=${{ matrix.node-version }} npm test



      - name: Force Neutral Exit on Skip
        run: |
          if [ "$TRIGGER_NEUTRAL" = "true" ]; then
            echo "::set-output name=status::neutral"
            exit 78
          fi


      - name: Force Neutral Exit on Skip
        run: |
          if [ "$TRIGGER_NEUTRAL" = "true" ]; then
            echo "::set-output name=status::neutral"
            exit 78
          fi
